name: Publish to NPM

on:
  push:
    branches: [ add-github-actions ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Node
        uses: actions/setup-node@v2
        with:
          node-version: '15.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and Build
        run: |
          yarn install
          yarn build
          dir
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}  